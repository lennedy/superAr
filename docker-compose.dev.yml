services:
  api:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # ajuda bastante em Linux/WSL para o watcher
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api